<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Tab Settings</title>
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" id="theme-stylesheet" href="../css/themes/minimalistic-dark.css" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="popup-app" class="popup-app">
    <div class="popup-header">
      <span class="popup-logo">✦</span>
      <span class="popup-title">New Tab Settings</span>
    </div>

    <!-- Mode switcher -->
    <div class="popup-section">
      <div class="popup-label">Page Mode</div>
      <div class="mode-toggle" id="popup-mode-toggle">
        <button class="mode-btn active" id="popup-btn-minimalistic" data-mode="minimalistic">🌿 Minimal</button>
        <button class="mode-btn" id="popup-btn-work" data-mode="work">💼 Work</button>
      </div>
    </div>

    <!-- Light / Dark -->
    <div class="popup-section">
      <div class="settings-toggle-row">
        <span>Dark Mode</span>
        <label class="toggle-switch">
          <input type="checkbox" id="popup-dark-toggle" />
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <!-- Open new tab link -->
    <div class="popup-footer">
      <a href="../newtab.html" target="_blank" class="popup-link">Open New Tab →</a>
    </div>
  </div>

  <script src="../js/storage.js"></script>
  <script src="../js/theme-manager.js"></script>
  <script src="popup.js"></script>
</body>
</html>
